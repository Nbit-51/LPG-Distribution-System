<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Consumers -- LPG System</title>
<link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
<div class="app-shell">
  <div id="sidebar-mount"></div>
  <main class="main-content">
    <div class="page-header">
      <div>
        <div class="page-title">Consumers</div>
        <div class="page-sub">Manage registered consumers</div>
      </div>
      <button class="btn btn-primary" onclick="openAddModal()">+ Add Consumer</button>
    </div>
    <div class="card">
      <div style="margin-bottom:15px;display:flex;gap:10px;flex-wrap:wrap">
        <input type="text" id="search-input" placeholder="Search by name or phone..." onkeyup="loadConsumers(1)"
          style="padding:8px 12px;border:1px solid #e2e8f0;border-radius:6px;font-size:14px;flex:1;min-width:200px">
        <select id="filter-type" onchange="loadConsumers(1)"
          style="padding:8px 12px;border:1px solid #e2e8f0;border-radius:6px;font-size:14px">
          <option value="">All Types</option>
          <option value="domestic">Domestic</option>
          <option value="essential">Essential</option>
          <option value="commercial">Commercial</option>
        </select>
        <select id="filter-active" onchange="loadConsumers(1)"
          style="padding:8px 12px;border:1px solid #e2e8f0;border-radius:6px;font-size:14px">
          <option value="">All Status</option>
          <option value="true">Active</option>
          <option value="false">Inactive</option>
        </select>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>ID</th><th>Name</th><th>Phone</th><th>Type</th><th>Agency</th><th>Quota</th><th>Status</th><th>Actions</th>
          </tr></thead>
          <tbody id="consumers-tbody"></tbody>
        </table>
      </div>
      <div id="pagination" style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px;align-items:center"></div>
    </div>
  </main>
</div>

<div id="consumer-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:10px;padding:28px;width:520px;max-width:95%;max-height:90vh;overflow-y:auto;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <h2 style="font-size:18px;font-weight:700;" id="modal-title">Add Consumer</h2>
      <button onclick="closeConsumerModal()" style="background:none;border:none;font-size:22px;cursor:pointer;">&times;</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
      <div style="grid-column:1/-1">
        <label style="display:block;font-size:11px;font-weight:600;color:#64748b;margin-bottom:5px;">FULL NAME *</label>
        <input type="text" id="c-name" style="width:100%;padding:9px 12px;border:1px solid #e2e8f0;border-radius:6px;font-size:14px;">
      </div>
      <div>
        <label style="display:block;font-size:11px;font-weight:600;color:#64748b;margin-bottom:5px;">PHONE *</label>
        <input type="tel" id="c-phone" style="width:100%;padding:9px 12px;border:1px solid #e2e8f0;border-radius:6px;font-size:14px;">
      </div>
      <div>
        <label style="display:block;font-size:11px;font-weight:600;color:#64748b;margin-bottom:5px;">EMAIL</label>
        <input type="email" id="c-email" style="width:100%;padding:9px 12px;border:1px solid #e2e8f0;border-radius:6px;font-size:14px;">
      </div>
      <div style="grid-column:1/-1">
        <label style="display:block;font-size:11px;font-weight:600;color:#64748b;margin-bottom:5px;">ADDRESS *</label>
        <input type="text" id="c-address" style="width:100%;padding:9px 12px;border:1px solid #e2e8f0;border-radius:6px;font-size:14px;">
      </div>
      <div>
        <label style="display:block;font-size:11px;font-weight:600;color:#64748b;margin-bottom:5px;">TYPE *</label>
        <select id="c-type" style="width:100%;padding:9px 12px;border:1px solid #e2e8f0;border-radius:6px;font-size:14px;">
          <option value="domestic">Domestic</option>
          <option value="essential">Essential</option>
          <option value="commercial">Commercial</option>
        </select>
      </div>
      <div>
        <label style="display:block;font-size:11px;font-weight:600;color:#64748b;margin-bottom:5px;">AGENCY *</label>
        <select id="c-agency" style="width:100%;padding:9px 12px;border:1px solid #e2e8f0;border-radius:6px;font-size:14px;"></select>
      </div>
      <div>
        <label style="display:block;font-size:11px;font-weight:600;color:#64748b;margin-bottom:5px;">CYLINDER QUOTA</label>
        <input type="number" id="c-quota" value="2" min="1" max="20" style="width:100%;padding:9px 12px;border:1px solid #e2e8f0;border-radius:6px;font-size:14px;">
      </div>
      <div id="c-active-row" style="display:none;">
        <label style="display:block;font-size:11px;font-weight:600;color:#64748b;margin-bottom:5px;">STATUS</label>
        <select id="c-active" style="width:100%;padding:9px 12px;border:1px solid #e2e8f0;border-radius:6px;font-size:14px;">
          <option value="true">Active</option>
          <option value="false">Inactive</option>
        </select>
      </div>
    </div>
    <div id="modal-err" style="display:none;background:#fee2e2;color:#991b1b;padding:9px 12px;border-radius:6px;font-size:13px;margin-top:14px;"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">
      <button onclick="closeConsumerModal()" style="padding:9px 18px;border:1px solid #e2e8f0;border-radius:6px;background:#fff;cursor:pointer;">Cancel</button>
      <button onclick="saveConsumer()" style="padding:9px 18px;border:none;border-radius:6px;background:#f97316;color:#fff;font-weight:600;cursor:pointer;">Save</button>
    </div>
  </div>
</div>

<div id="view-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:10px;padding:28px;width:520px;max-width:95%;max-height:90vh;overflow-y:auto;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <h2 style="font-size:18px;font-weight:700;">Consumer Details</h2>
      <button onclick="document.getElementById('view-modal').style.display='none'" style="background:none;border:none;font-size:22px;cursor:pointer;">&times;</button>
    </div>
    <div id="view-body"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">
      <button onclick="document.getElementById('view-modal').style.display='none'" style="padding:9px 18px;border:1px solid #e2e8f0;border-radius:6px;background:#fff;cursor:pointer;">Close</button>
      <button id="view-edit-btn" style="padding:9px 18px;border:none;border-radius:6px;background:#3b5bdb;color:#fff;font-weight:600;cursor:pointer;">Edit</button>
      <button id="view-toggle-btn" style="padding:9px 18px;border:none;border-radius:6px;color:#fff;font-weight:600;cursor:pointer;">Deactivate</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/static/js/utils.js"></script>
<script src="/static/js/layout.js"></script>
<script>
requireAuth();
renderSidebar('consumer');

var currentPage = 1;
var editingId = null;
var agencies = [];

async function init() {
  try {
    var agData = await api.get('/agencies/?page_size=100');
    agencies = agData.results || [];
    document.getElementById('c-agency').innerHTML = agencies.map(function(a) {
      return '<option value="' + a.agency_id + '">' + a.agency_name + '</option>';
    }).join('');
  } catch(e) {}
  loadConsumers(1);
}

async function loadConsumers(page) {
  if (page) currentPage = page;
  try {
    var search = document.getElementById('search-input').value.trim();
    var type = document.getElementById('filter-type').value;
    var active = document.getElementById('filter-active').value;
    var url = '/consumers/?page=' + currentPage + '&page_size=20';
    if (search) url += '&search=' + encodeURIComponent(search);
    if (type) url += '&consumer_type=' + type;
    if (active !== '') url += '&is_active=' + active;

    var data = await api.get(url);
    var consumers = data.results || [];
    var total = data.total || 0;

    var tbody = document.getElementById('consumers-tbody');
    tbody.innerHTML = consumers.length ? consumers.map(function(c) {
      return '<tr>' +
        '<td>#' + c.consumer_id + '</td>' +
        '<td><strong>' + c.full_name + '</strong></td>' +
        '<td>' + c.phone + '</td>' +
        '<td>' + badge(c.consumer_type) + '</td>' +
        '<td>' + getAgencyName(c.agency_id) + '</td>' +
        '<td>' + c.cylinder_quota + '</td>' +
        '<td><span class="badge badge-' + (c.is_active ? 'allocated' : 'cancelled') + '">' + (c.is_active ? 'Active' : 'Inactive') + '</span></td>' +
        '<td style="display:flex;gap:6px;">' +
        '<button class="btn btn-sm btn-secondary" onclick="viewConsumer(' + c.consumer_id + ')">View</button>' +
        '<button class="btn btn-sm" style="background:#3b5bdb;color:#fff;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px;" onclick="openEditModal(' + c.consumer_id + ')">Edit</button>' +
        '</td></tr>';
    }).join('') : emptyRow('No consumers found', 8);

    var totalPages = Math.ceil(total / 20);
    var pg = document.getElementById('pagination');
    pg.innerHTML = '<span style="font-size:13px;color:#64748b">' + total + ' total</span>';
    if (currentPage > 1) pg.innerHTML += '<button onclick="loadConsumers(' + (currentPage-1) + ')" style="padding:4px 10px;border:1px solid #e2e8f0;border-radius:4px;cursor:pointer;background:#fff">Prev</button>';
    if (totalPages > 1) pg.innerHTML += '<span style="font-size:13px">Page ' + currentPage + '/' + totalPages + '</span>';
    if (currentPage < totalPages) pg.innerHTML += '<button onclick="loadConsumers(' + (currentPage+1) + ')" style="padding:4px 10px;border:1px solid #e2e8f0;border-radius:4px;cursor:pointer;background:#fff">Next</button>';
  } catch(e) {
    toast(e.message, 'error');
  }
}

function getAgencyName(id) {
  var a = agencies.find(function(a) { return a.agency_id === id; });
  return a ? a.agency_name : '--';
}

function openAddModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Add Consumer';
  document.getElementById('c-name').value = '';
  document.getElementById('c-phone').value = '';
  document.getElementById('c-email').value = '';
  document.getElementById('c-address').value = '';
  document.getElementById('c-type').value = 'domestic';
  document.getElementById('c-quota').value = '2';
  document.getElementById('c-active-row').style.display = 'none';
  document.getElementById('modal-err').style.display = 'none';
  document.getElementById('consumer-modal').style.display = 'flex';
}

async function openEditModal(id) {
  try {
    var c = await api.get('/consumers/' + id);
    editingId = id;
    document.getElementById('modal-title').textContent = 'Edit Consumer #' + id;
    document.getElementById('c-name').value = c.full_name || '';
    document.getElementById('c-phone').value = c.phone || '';
    document.getElementById('c-email').value = c.email || '';
    document.getElementById('c-address').value = c.address || '';
    document.getElementById('c-type').value = c.consumer_type || 'domestic';
    document.getElementById('c-agency').value = c.agency_id || '';
    document.getElementById('c-quota').value = c.cylinder_quota || 2;
    document.getElementById('c-active').value = c.is_active ? 'true' : 'false';
    document.getElementById('c-active-row').style.display = 'block';
    document.getElementById('modal-err').style.display = 'none';
    document.getElementById('view-modal').style.display = 'none';
    document.getElementById('consumer-modal').style.display = 'flex';
  } catch(e) { toast(e.message, 'error'); }
}

async function viewConsumer(id) {
  try {
    var c = await api.get('/consumers/' + id);
    document.getElementById('view-body').innerHTML =
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">' +
      '<div><div style="font-size:11px;color:#64748b;font-weight:600;">NAME</div><div style="font-weight:600;">' + c.full_name + '</div></div>' +
      '<div><div style="font-size:11px;color:#64748b;font-weight:600;">PHONE</div><div>' + c.phone + '</div></div>' +
      '<div><div style="font-size:11px;color:#64748b;font-weight:600;">EMAIL</div><div>' + (c.email || '--') + '</div></div>' +
      '<div><div style="font-size:11px;color:#64748b;font-weight:600;">TYPE</div><div>' + badge(c.consumer_type) + '</div></div>' +
      '<div style="grid-column:1/-1"><div style="font-size:11px;color:#64748b;font-weight:600;">ADDRESS</div><div>' + c.address + '</div></div>' +
      '<div><div style="font-size:11px;color:#64748b;font-weight:600;">AGENCY</div><div>' + getAgencyName(c.agency_id) + '</div></div>' +
      '<div><div style="font-size:11px;color:#64748b;font-weight:600;">QUOTA</div><div>' + c.cylinder_quota + ' cylinders</div></div>' +
      '<div><div style="font-size:11px;color:#64748b;font-weight:600;">STATUS</div><div>' + (c.is_active ? '<span style="color:#16a34a">Active</span>' : '<span style="color:#dc2626">Inactive</span>') + '</div></div>' +
      '<div><div style="font-size:11px;color:#64748b;font-weight:600;">REGISTERED</div><div>' + fmtDate(c.registered_at) + '</div></div>' +
      '</div>';
    document.getElementById('view-edit-btn').onclick = function() { openEditModal(id); };
    var toggleBtn = document.getElementById('view-toggle-btn');
    toggleBtn.textContent = c.is_active ? 'Deactivate' : 'Reactivate';
    toggleBtn.style.background = c.is_active ? '#dc2626' : '#16a34a';
    toggleBtn.onclick = function() { toggleConsumer(id, c.is_active); };
    document.getElementById('view-modal').style.display = 'flex';
  } catch(e) { toast(e.message, 'error'); }
}

async function toggleConsumer(id, isActive) {
  if (!confirm((isActive ? 'Deactivate' : 'Reactivate') + ' this consumer?')) return;
  try {
    await api.patch('/consumers/' + id, { is_active: !isActive });
    toast('Consumer ' + (isActive ? 'deactivated' : 'reactivated'), 'success');
    document.getElementById('view-modal').style.display = 'none';
    loadConsumers();
  } catch(e) { toast(e.message, 'error'); }
}

async function saveConsumer() {
  var errEl = document.getElementById('modal-err');
  errEl.style.display = 'none';
  var name = document.getElementById('c-name').value.trim();
  var phone = document.getElementById('c-phone').value.trim();
  var address = document.getElementById('c-address').value.trim();
  if (!name || !phone || !address) {
    errEl.textContent = 'Name, phone and address are required.';
    errEl.style.display = 'block';
    return;
  }
  var payload = {
    full_name: name,
    phone: phone,
    address: address,
    consumer_type: document.getElementById('c-type').value,
    agency_id: parseInt(document.getElementById('c-agency').value),
    cylinder_quota: parseInt(document.getElementById('c-quota').value) || 2
  };
  var email = document.getElementById('c-email').value.trim();
  if (email) payload.email = email;
  if (editingId) payload.is_active = document.getElementById('c-active').value === 'true';
  try {
    if (editingId) {
      await api.patch('/consumers/' + editingId, payload);
      toast('Consumer updated', 'success');
    } else {
      await api.post('/consumers/', payload);
      toast('Consumer added', 'success');
    }
    closeConsumerModal();
    loadConsumers();
  } catch(e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  }
}

function closeConsumerModal() {
  document.getElementById('consumer-modal').style.display = 'none';
  editingId = null;
}

init();
</script>
</body>
</html>
