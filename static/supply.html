<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Supply - LPG System</title><link rel="stylesheet" href="/static/css/main.css"></head><body><div class="app-shell">  <div id="sidebar-mount"></div>  <main class="main-content">    <div class="page-header">      <div><h1 class="page-title">Supply Management</h1><p class="page-subtitle">Record stock and monitor inventory levels</p></div>      <button class="btn btn-primary" onclick="document.getElementById('add-modal').style.display='flex'">+ Record Supply</button>    </div>    <div class="stats-grid" id="stats-grid"></div>    <div class="grid-2" style="margin-bottom:24px">      <div class="card">        <div class="card-header"><h3 class="card-title">Stock by Agency</h3></div>        <div id="stock-list"></div>      </div>      <div class="card">        <div class="card-header"><h3 class="card-title">Low Stock Alerts</h3></div>        <div id="alerts-list"></div>      </div>    </div>    <div class="card">      <div class="card-header">        <h3 class="card-title">Supply Records</h3>        <select id="f-agency" class="form-control" style="width:200px" onchange="load()"><option value="">All Agencies</option></select>      </div>      <div class="table-wrap">        <table class="table">          <thead><tr><th>ID</th><th>Agency</th><th>Cylinders Received</th><th>Supplier</th><th>Batch Ref</th><th>Date</th></tr></thead>          <tbody id="tbody"><tr><td colspan="6" class="table-empty">Loading...</td></tr></tbody>        </table>      </div>    </div>  </main></div><div id="add-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;" onclick="if(event.target===this)document.getElementById('add-modal').style.display='none'">  <div style="background:#fff;border-radius:10px;padding:28px;width:500px;max-width:95%;max-height:90vh;overflow-y:auto;">    <div class="modal-header"><h3>Record Supply Received</h3><button class="modal-close" onclick="document.getElementById('add-modal').style.display='none'">&times;</button></div>    <div class="modal-body">      <div class="form-group"><label class="form-label">Agency *</label><select id="s-agency" class="form-control"></select></div>      <div class="form-group"><label class="form-label">Cylinders Received *</label><input id="s-qty" class="form-control" type="number" placeholder="e.g. 200" min="1"></div>      <div class="form-row">        <div class="form-group"><label class="form-label">Supplier Name</label><input id="s-supplier" class="form-control" placeholder="e.g. HPCL Bottling Plant"></div>        <div class="form-group"><label class="form-label">Batch Reference</label><input id="s-batch" class="form-control" placeholder="e.g. HPCL-2026-001"></div>      </div>      <div class="form-group"><label class="form-label">Notes</label><textarea id="s-notes" class="form-control" rows="2"></textarea></div>    </div>    <div class="modal-footer">      <button class="btn btn-outline" onclick="document.getElementById('add-modal').style.display='none'">Cancel</button>      <button class="btn btn-primary" onclick="addSupply()">Record Supply</button>    </div>  </div></div><div id="toast-container"></div><script src="/static/js/utils.js"></script><script src="/static/js/layout.js"></script><script>if (!requireAuth()) {}else { renderSidebar('supply'); load(); }async function load() {  try {    const [supplyData, agencyData, alertData] = await Promise.all([      api.get('/supply/?page=1&page_size=100'),      api.get('/agencies/?page_size=100'),      api.get('/supply/low-stock?threshold=50').catch(()=>({results:[]})),    ]);    const records=supplyData.results||supplyData||[], agencies=agencyData.results||agencyData.agencies||agencyData||[], alerts=alertData.results||alertData||[];    const totalRec=records.reduce((s,r)=>s+(r.cylinders_received||0),0), totalAvail=agencies.reduce((s,a)=>s+(a.available_cylinders||0),0);    document.getElementById('stats-grid').innerHTML=`      <div class="stat-card"><div class="stat-value">${totalRec}</div><div class="stat-label">Total Received</div></div>      <div class="stat-card green"><div class="stat-value">${totalAvail}</div><div class="stat-label">Currently Available</div></div>      <div class="stat-card ${alerts.length>0?'red':''}"><div class="stat-value">${alerts.length}</div><div class="stat-label">Low Stock Alerts</div></div>      <div class="stat-card blue"><div class="stat-value">${records.length}</div><div class="stat-label">Supply Records</div></div>    `;    document.getElementById('stock-list').innerHTML=agencies.length?agencies.map(a=>{const pct=a.total_capacity?Math.round((a.available_cylinders/a.total_capacity)*100):0;return `<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span>${a.agency_name||a.name}</span><span style="color:#64748b">${a.available_cylinders||0}/${a.total_capacity||0}</span></div><div class="progress-bar-wrap"><div class="progress-bar-fill ${pct<20?'low':pct>60?'high':''}" style="width:${Math.min(pct,100)}%"></div></div></div>`;}).join(''):'<p class="table-empty">No agencies</p>';    document.getElementById('alerts-list').innerHTML=alerts.length?alerts.map(a=>`<div class="alert alert-warning" style="margin-bottom:8px"><strong>${a.agency_name||'Agency'}</strong><br><small>Available: ${a.available_cylinders||0} cylinders</small></div>`).join(''):'<p style="color:#16a34a;font-size:13px;text-align:center;padding:20px">All agencies adequately stocked</p>';    const sel=document.getElementById('f-agency'), selVal=sel.value;    sel.innerHTML='<option value="">All Agencies</option>'+agencies.map(a=>`<option value="${a.agency_id||a.id}" ${selVal==(a.agency_id||a.id)?'selected':''}>${a.agency_name||a.name}</option>`).join('');    document.getElementById('s-agency').innerHTML=agencies.map(a=>`<option value="${a.agency_id||a.id}">${a.agency_name||a.name}</option>`).join('');    const filtered=selVal?records.filter(r=>r.agency_id==selVal):records;    document.getElementById('tbody').innerHTML=filtered.length?filtered.map(r=>`<tr><td>${r.supply_id||r.id}</td><td>${r.agency_name||r.agency_id||'--'}</td><td style="color:#16a34a;font-weight:600">${r.cylinders_received}</td><td>${r.supplier_name||'--'}</td><td>${r.batch_reference||r.batch_ref||'--'}</td><td>${fmtDate(r.received_date||r.created_at)}</td></tr>`).join(''):'<tr><td colspan="6" class="table-empty">No supply records</td></tr>';  } catch(e) { toast(e.message,'error'); }}async function addSupply() {  const body={agency_id:parseInt(document.getElementById('s-agency').value),cylinders_received:parseInt(document.getElementById('s-qty').value),supplier_name:document.getElementById('s-supplier').value.trim(),batch_reference:document.getElementById('s-batch').value.trim(),notes:document.getElementById('s-notes').value.trim()};  if(!body.cylinders_received){toast('Quantity required','warning');return;}  try{await api.post('/supply/',body);toast('Supply recorded');document.getElementById('add-modal').style.display='none';load();}catch(e){toast(e.message,'error');}}</script></body></html>
